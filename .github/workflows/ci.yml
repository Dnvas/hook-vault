name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives,
# but never cancel runs on main itself.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    name: Build, test, and format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      # Cache the global NuGet package store keyed on the lock of all .csproj
      # files. A mismatch (new/changed package) falls back to the OS-level key
      # and still gets a partial cache hit.
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=results.trx"
          --results-directory ./TestResults

      # Upload TRX results so they appear in the Actions summary even on failure.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/*.trx

      # dotnet format --verify-no-changes exits non-zero if anything needs
      # reformatting, which fails the job. Run last so test output is always
      # visible even when a format issue exists.
      - name: Check formatting
        run: dotnet format --verify-no-changes

  ui-build:
    name: Build and lint React UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Lint UI
        run: npm run lint
        working-directory: ui

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [ui-build]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
